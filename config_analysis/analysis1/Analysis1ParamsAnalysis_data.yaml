    edge_type: "uniform"
    edges: [-3.2, 3.2, 100.]
  - hist_name: "osgn_chargeprod"
    edge_type: "custom"
    edges: [-1.5, -0.5, 0.5, 1.5]
  # same sign
  - hist_name: "ssgn_mt"
    edge_type: "uniform"
