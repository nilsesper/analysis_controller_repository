# analysis histograms
ana_hists:
  # opposite sign
  - hist_name: "osgn_mt"
    edge_type: "uniform"
    edges: [0., 200., 100.]
  - hist_name: "osgn_dr"
    edge_type: "uniform"
    edges: [0., 4., 100.]
  - hist_name: "osgn_deta"
    edge_type: "uniform"
    edges: [-2., 2., 100.]
