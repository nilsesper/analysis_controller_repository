### FOR SIMULATION

# PDG value in GeV
muon_mass: 0.10566

# iteration size of event loop, to limit ram resources
eventloop_iteration_size: 1 GiB

# histogram edges
hist_edges: # hist_name: {edge_type, edges}
  n_tracks:
    edge_type: "custom"
    edges: [-0.5, 0.5, 1.5, 2.5]
  pt:
    edge_type: "uniform"
    edges: [0., 1100., 100.]
  eta:
    edge_type: "uniform"
    edges: [-5., 5., 100.]
  phi:
    edge_type: "uniform"
    edges: [-8., 8., 100.]
  charge:
    edge_type: "custom"
    edges: [-1.5, -0.5, 0.5, 1.5]
  dxy:
    edge_type: "custom"
    edges: [-0.5, 0.5, 1.5, 2.5, 3.5]
  qual:
    edge_type: "custom"
    edges: [11.5, 12.5, 13.5, 14.5, 15.5]
  mass_t:
    edge_type: "uniform"
    edges: [0., 200., 100.]
  delta_r:
    edge_type: "uniform"
    edges: [0., 4., 100.]
  delta_eta:
    edge_type: "uniform"
    edges: [-2., 2., 100.]
  delta_phi:
    edge_type: "uniform"
    edges: [-3.2, 3.2, 100.]
  charge_product:
    edge_type: "custom"
    edges: [-1.5, -0.5, 0.5, 1.5]
